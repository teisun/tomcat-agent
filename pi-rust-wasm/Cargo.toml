[package]
name = "pi_awsm"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "2.0"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
config = "0.14"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "5.0"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }
tracing-appender = "0.2"
