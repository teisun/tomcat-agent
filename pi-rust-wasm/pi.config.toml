# PI-WASM 配置
# 环境变量 PI_WASM__*（如 PI_WASM__LLM__PROXY）会覆盖同名字段。

# ------------------------------------------------------------------------------
# [log] 日志配置：控制运行时日志级别与是否写入文件
# ------------------------------------------------------------------------------
[log]
# level：日志级别。控制输出到 stderr 的日志最低等级。
# 取值：trace | debug | info | warn | error。用于排查问题时可设为 debug。
level = "info"
# file_enabled：是否同时把 tracing 写入文件。true 时写入 work_dir/agents/{agent.id}/logs/，按日切分（文件名前缀 pi_wasm），便于事后排查。
file_enabled = true

# ------------------------------------------------------------------------------
# [llm] LLM 接入配置：大模型 API 地址、密钥、限流与重试
# ------------------------------------------------------------------------------
[llm]
# provider：当前使用的 LLM 提供商标识。如 "openai"，用于选择对应适配器。
provider = "openai"
# api_base：API 根地址。不填则默认 https://api.openai.com；自建或代理时可改写。
api_base = "https://api.openai.com"
# api_key_env：存 API Key 的环境变量名。不填则默认从 OPENAI_API_KEY 读取。
default_model = "gpt-5.2"
# max_concurrent_requests：允许同时进行的 LLM 请求数，用于限流；0 表示不限制（不推荐）。
max_concurrent_requests = 4
# retry_count：非流式请求失败时的重试次数，仅对可重试错误（如 429、5xx）生效。
retry_count = 3
# stream_timeout_sec：流式请求单次读取的超时秒数，超时则中断流式输出。
stream_timeout_sec = 60
# proxy：HTTP(S) 代理 URL。设置后所有 LLM 请求经该代理；不填则使用环境变量 HTTPS_PROXY/HTTP_PROXY（若有）。
proxy = "http://127.0.0.1:7890"
# api_base_fallback：主 api_base 不可达（连接失败、超时等）时，自动用此 URL 重试；留空则关闭降级。
api_base_fallback = "https://api.chatanywhere.tech"

# ------------------------------------------------------------------------------
# [storage] 存储配置：工作根目录
# agent 系统子目录（sessions/logs/audit 等）全部由 work_dir 按架构推导，不可单独配置。
# 详见 openspec/specs/architecture/work-dir-and-data-layout.md
# ------------------------------------------------------------------------------
[storage]
# work_dir：工作根目录。所有 agent 系统子目录从此推导。默认 ~/.pi_/
# 可通过环境变量 PI_WASM__STORAGE__WORK_DIR 覆盖。
work_dir = "~/.pi_/"

# ------------------------------------------------------------------------------
# [agent] Agent 配置：标识、身份目录、工作区
# ------------------------------------------------------------------------------
[agent]
# id：agent 标识，影响运行时数据目录和 session key 命名。
id = "main"
# agent_dir：agent 身份与凭据目录。未配置时默认 work_dir/agents/{id}/agent。
# agent_dir = "~/.pi_/agents/main/agent"
# workspace：agent 工作区目录。未配置时默认 work_dir/workspace-{id}。
# workspace = "~/.pi_/workspace-main"

# ------------------------------------------------------------------------------
# [workspace] 全局用户工作区根（所有 agent 共用；与上方 [agent].workspace 不同）
# 由 `pi workspace add/list/remove` 维护，也可手编。每项须为已存在的目录路径。
# ------------------------------------------------------------------------------
[workspace]
workspace_roots = []

# ------------------------------------------------------------------------------
# [plugin] 插件配置：启动时自动加载列表
# 插件目录由 work_dir 推导为 work_dir/plugins
# ------------------------------------------------------------------------------
[plugin]
# auto_load：启动时自动加载的插件 ID 列表。空则需手动 load；填如 ["my-plugin"] 则启动即加载。
auto_load = []

# ------------------------------------------------------------------------------
# [security] 安全与审计：默认插件权限、审计日志、安全扫描
# ------------------------------------------------------------------------------
[security]
# default_plugin_permission_level：新加载插件的默认权限。restricted=仅白名单内操作；normal/trusted 放宽。
# 取值：restricted | normal | trusted
default_plugin_permission_level = "restricted"
# enable_audit_log：是否记录审计日志。true 时 4 原语与高危操作会写入审计，可追溯。
enable_audit_log = true
# audit_log_retention_days：审计日志保留天数，超过则可被清理；必须 > 0。
audit_log_retention_days = 90
# enable_plugin_safety_scan：是否在加载插件前做安全扫描（恶意/越权检测）。MVP 阶段多为占位。
enable_plugin_safety_scan = false

# ------------------------------------------------------------------------------
# [wasm] Wasm 运行时（feature "wasmedge"）
# quickjs wasm 文件由 work_dir 推导为 work_dir/assets/wasm/wasmedge_quickjs.wasm，
# 找不到时回退到环境变量 WASMEDGE_QUICKJS_PATH。
# ------------------------------------------------------------------------------
[wasm]

# ------------------------------------------------------------------------------
# [primitive] 4 原语配置：read/write/edit/bash 的审批与自动确认策略
# ------------------------------------------------------------------------------
[primitive]
# path_whitelist：文件操作（read/write/edit/list_dir）允许的路径前缀列表。
# 空列表 = 仅允许 work_dir/workspace-main 目录下的路径（隐式白名单）。
# 示例：path_whitelist = ["/home/user/project", "/tmp"]
path_whitelist = []
# path_blacklist：即使在白名单内也禁止操作的路径前缀。优先级高于白名单。
# 示例：path_blacklist = ["/home/user/project/.env", "/home/user/project/.git"]
path_blacklist = []
# bash_whitelist：允许执行的 bash 命令前缀。空列表 = 不限制（由 require_approval_for_all_bash 控制）。
# 示例：bash_whitelist = ["ls", "cat", "grep", "echo"]
bash_whitelist = []
# bash_approval_required：即使 auto_confirm=true 也需要用户逐条确认的命令前缀。
# 示例：bash_approval_required = ["rm", "sudo", "chmod"]
bash_approval_required = []
# bash_forbidden：绝对禁止执行的命令前缀，无论确认策略如何。
# 示例：bash_forbidden = ["rm -rf /", "dd if="]
bash_forbidden = []
# auto_confirm：是否对符合条件（如白名单内）的操作自动确认，无需用户逐条确认。
auto_confirm = false
# auto_confirm_whitelist：auto_confirm=true 时仅对此列表内路径自动确认；空列表 = 全部自动确认。
# 示例：auto_confirm_whitelist = ["/home/user/project/src"]
auto_confirm_whitelist = []
# require_approval_for_all_write：是否对所有 write 操作强制要求用户确认后再执行。
require_approval_for_all_write = true
# require_approval_for_all_bash：是否对所有 bash 命令强制要求用户确认后再执行。
require_approval_for_all_bash = true
