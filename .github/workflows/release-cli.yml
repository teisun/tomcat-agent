name: release-cli

on:
  push:
    tags:
      - "cli-v*"
      - "dry-run-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "CLI release tag to validate/package (for dry runs)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RAW_RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    defaults:
      run:
        shell: bash
        working-directory: tomcat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          raw="${RAW_RELEASE_REF}"
          case "${raw}" in
            dry-run-cli-v*) release_tag="${raw#dry-run-}" ;;
            cli-v*) release_tag="${raw}" ;;
            *)
              echo "Unsupported CLI release ref: ${raw}" >&2
              exit 1
              ;;
          esac
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node for release guards
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate CLI release tag
        run: node ../.github/scripts/release/check-cli-tag.mjs "${GITHUB_WORKSPACE}" "${{ steps.meta.outputs.release_tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tomcat -> target

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package release archive
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.release_tag }}"
          target="${{ matrix.target }}"
          package="tomcat-${tag}-${target}"
          bin_path="target/${target}/release/tomcat"

          test -f "${bin_path}"
          mkdir -p dist
          tar -C "$(dirname "${bin_path}")" -czf "dist/${package}.tar.gz" "$(basename "${bin_path}")"

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: release-cli-${{ matrix.target }}
          path: tomcat/dist/tomcat-${{ steps.meta.outputs.release_tag }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: publish cli release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref_name, 'dry-run-')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-cli-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
