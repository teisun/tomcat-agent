name: release-ext

on:
  push:
    tags:
      - "ext-v*"
      - "dry-run-ext-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extension release tag to validate/package (for dry runs)"
        required: true
        type: string
      cli_run_id:
        description: "Optional release-cli workflow run ID that provides dry-run CLI artifacts"
        required: false
        type: string

permissions:
  contents: read

env:
  CLI_ARTIFACT_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_run_id || '' }}
  RAW_RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: build extension packages
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: tomcat-vscode-ext

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          raw="${RAW_RELEASE_REF}"
          use_cli_artifacts=0
          case "${raw}" in
            dry-run-ext-v*)
              release_tag="${raw#dry-run-}"
              use_cli_artifacts=1
              ;;
            ext-v*)
              release_tag="${raw}"
              ;;
            *)
              echo "Unsupported extension release ref: ${raw}" >&2
              exit 1
              ;;
          esac
          if [ -n "${CLI_ARTIFACT_RUN_ID}" ]; then
            use_cli_artifacts=1
          fi
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"
          printf 'use_cli_artifacts=%s\n' "${use_cli_artifacts}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: |
            tomcat-vscode-ext/package-lock.json
            tomcat-vscode-ext/gui/package-lock.json
          node-version: 22

      - name: Validate extension release tag
        id: guard
        run: node ../.github/scripts/release/check-ext-tag.mjs "${GITHUB_WORKSPACE}" "${{ steps.meta.outputs.release_tag }}"

      - name: Install extension dependencies
        run: |
          set -euo pipefail
          npm ci
          npm --prefix gui ci

      - name: Build extension once
        run: npm run build

      - name: Resolve CLI dry-run workflow run
        if: steps.meta.outputs.use_cli_artifacts == '1' && env.CLI_ARTIFACT_RUN_ID == ''
        id: cli_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs" \
            -f event=push \
            -f head_sha="${GITHUB_SHA}" \
            -f per_page=50 \
            --jq '.workflow_runs | map(select(.name == "release-cli" and .conclusion == "success")) | first | .id')"
          if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
            echo "Could not locate a successful release-cli dry-run for commit ${GITHUB_SHA}" >&2
            exit 1
          fi
          printf 'run_id=%s\n' "${run_id}" >> "${GITHUB_OUTPUT}"

      - name: Download dry-run CLI artifacts
        if: steps.meta.outputs.use_cli_artifacts == '1'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          merge-multiple: false
          path: bundles/artifacts
          pattern: release-cli-*
          repository: ${{ github.repository }}
          run-id: ${{ env.CLI_ARTIFACT_RUN_ID || steps.cli_run.outputs.run_id }}

      - name: Check dry-run CLI artifacts
        if: steps.meta.outputs.use_cli_artifacts == '1'
        env:
          PINNED_CLI_VERSION: ${{ steps.guard.outputs.bundled_cli_version }}
        run: |
          set -euo pipefail
          tag="cli-v${PINNED_CLI_VERSION}"
          asset_names=""
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            archive="tomcat-${tag}-${target}.tar.gz"
            artifact_dir="../bundles/artifacts/release-cli-${target}"
            test -f "${artifact_dir}/${archive}"
            asset_names="${asset_names}${archive}\n"
          done
          printf '%b' "${asset_names}" \
            | node ../.github/scripts/release/check-bundled-cli-assets.mjs "${PINNED_CLI_VERSION}"

      - name: Check pinned CLI release assets
        if: steps.meta.outputs.use_cli_artifacts != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          PINNED_CLI_VERSION: ${{ steps.guard.outputs.bundled_cli_version }}
        run: |
          set -euo pipefail
          tag="cli-v${PINNED_CLI_VERSION}"
          asset_names="$(gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          printf '%s\n' "${asset_names}" \
            | node ../.github/scripts/release/check-bundled-cli-assets.mjs "${PINNED_CLI_VERSION}"

      - name: Package bundled and pure VSIX artifacts
        env:
          EXT_VERSION: ${{ steps.guard.outputs.extension_version }}
          GH_TOKEN: ${{ github.token }}
          PINNED_CLI_VERSION: ${{ steps.guard.outputs.bundled_cli_version }}
          USE_CLI_ARTIFACTS: ${{ steps.meta.outputs.use_cli_artifacts }}
        run: |
          set -euo pipefail
          mkdir -p dist bundles

          package_bundled_vsix() {
            local cli_target="$1"
            local vscode_target="$2"
            local tag="cli-v${PINNED_CLI_VERSION}"
            local bundle_dir="bundles/${cli_target}"
            local archive="tomcat-${tag}-${cli_target}.tar.gz"

            mkdir -p "${bundle_dir}"
            if [ "${USE_CLI_ARTIFACTS}" = "1" ]; then
              cp "../bundles/artifacts/release-cli-${cli_target}/${archive}" "${bundle_dir}/${archive}"
            else
              gh release download "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --pattern "${archive}" \
                --dir "${bundle_dir}"
            fi
            tar -xzf "${bundle_dir}/${archive}" -C "${bundle_dir}"

            npx tsx scripts/package-vsix.ts \
              --skip-build \
              --target "${vscode_target}" \
              --bundle-binary "${bundle_dir}/tomcat" \
              --out "dist/tomcat-vscode-ext-${EXT_VERSION}-${vscode_target}.vsix"
          }

          package_bundled_vsix "aarch64-apple-darwin" "darwin-arm64"
          package_bundled_vsix "x86_64-apple-darwin" "darwin-x64"
          package_bundled_vsix "x86_64-unknown-linux-gnu" "linux-x64"

          npx tsx scripts/package-vsix.ts \
            --skip-build \
            --out "dist/tomcat-vscode-ext-${EXT_VERSION}.vsix"

      - name: Upload packaged VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ext-vsix
          path: tomcat-vscode-ext/dist/*.vsix
          if-no-files-found: error

  publish:
    name: publish extension release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref_name, 'dry-run-')
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-ext-vsix
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.vsix > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.vsix
            dist/SHA256SUMS
          generate_release_notes: true

      - name: Publish VSIX files to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          for file in dist/*.vsix; do
            npx @vscode/vsce publish --packagePath "$file" -p "${VSCE_PAT}"
          done

      - name: Publish VSIX files to OpenVSX
        if: ${{ secrets.OVSX_PAT != '' }}
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          for file in dist/*.vsix; do
            npx ovsx publish "$file" -p "${OVSX_PAT}"
          done
