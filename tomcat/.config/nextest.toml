[test-groups]
# 兜底位：默认空着。只有 3x 连跑证明确实互踩或压垮机器时，才把个别 binary 放进来。
serial = { max-threads = 1 }
real-llm = { max-threads = 2 }

[profile.default]
# 默认门禁不跑显式 real-llm 层，也不跑 cli_tests 里那 5 个真 LLM 慢用例。
default-filter = 'not (binary(current_tail_guard_real_llm_tests) or binary(openai_files_integration_tests) or binary(openai_responses_integration_tests) or binary(plan_real_llm_inprocess_tests) or binary(plan_real_llm_cli_e2e) or binary(reasoning_continuity_real_llm_tests) or (binary(cli_tests) and test(/_real_llm_cli$/)))'

[profile.real-llm]
inherits = "default"
default-filter = '(binary(current_tail_guard_real_llm_tests) or binary(openai_files_integration_tests) or binary(openai_responses_integration_tests) or binary(plan_real_llm_inprocess_tests) or binary(plan_real_llm_cli_e2e) or binary(reasoning_continuity_real_llm_tests) or (binary(cli_tests) and test(/_real_llm_cli$/)))'

[[profile.real-llm.overrides]]
filter = 'all()'
test-group = 'real-llm'
