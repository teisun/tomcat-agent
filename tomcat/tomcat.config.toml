# TOMCAT 配置
# 环境变量 TOMCAT__*（如 TOMCAT__LLM__PROXY）会覆盖同名字段。

[log]
level = "warn"
# true 时写入 work_dir/agents/{agent.id}/logs/，文件名前缀 tomcat。
file_enabled = true

[llm]
provider = "openai-responses"
api_base = "https://api.openai.com"
default_model = "gpt-5.4"
max_concurrent_requests = 4
retry_count = 3
# 三层超时：
# - stream_timeout_sec: 流式 chunk 空闲超时，不是整次请求超时（0 = 关闭）
# - non_stream_stale_timeout_sec: 非流式请求无进展 watchdog（0 = 关闭）
# - http_read_timeout_sec: socket 级 read 超时（0 = 关闭）
stream_timeout_sec = 180
non_stream_stale_timeout_sec = 300
http_read_timeout_sec = 120
# proxy = "http://127.0.0.1:7890"
# api_base_fallback = "https://api.chatanywhere.tech"
tool_cli_verbosity = "full"

[llm.thinking]
enabled = true
level = "xhigh"
# minimal = 仅显示 `[thinking] ...` 占位；summary = 仅显示摘要；full = 摘要 + raw 全显
show = "summary"
persist = false
print_to_stderr = false

[storage]
# 默认 ~/.tomcat/；可用 TOMCAT__STORAGE__WORK_DIR 覆盖。
work_dir = "~/.tomcat/"

[agent]
id = "main"
# agent_dir = "~/.tomcat/agents/main/agent"
# workspace = "~/.tomcat/workspace-main"

[workspace]
workspace_roots = []

[plugin]
auto_load = []

[security]
default_plugin_permission_level = "restricted"
enable_audit_log = true
audit_log_retention_days = 90
enable_plugin_safety_scan = false

[wasm]

[primitive]
path_rules = []
bash_approval_required = []
bash_forbidden = []
auto_confirm = true
